                {/* 2. רקע פיזי ואנושי */}
                <section className="space-y-4">
                  <h3 className="text-sm font-bold text-slate-500 uppercase tracking-widest border-b border-slate-800 pb-2 mb-4 flex items-center gap-2">
                    <i className="fa-solid fa-map-location-dot"></i> רקע פיזי ואנושי
                  </h3>
                  
                  <div className="flex items-start gap-3.5 bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50 hover:bg-slate-800/60 transition-colors shadow-sm">
                    <i className="fa-solid fa-expand text-sky-400 shrink-0 mt-0.5 text-lg"></i>
                    <div>
                      <h4 className="text-xs font-bold text-sky-400 uppercase tracking-widest mb-1.5">שטח גיאוגרפי</h4>
                      <p className="text-slate-300 text-sm leading-relaxed">{area}</p>
                    </div>
                  </div>
                  
                  <div className="flex items-start gap-3.5 bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50 hover:bg-slate-800/60 transition-colors shadow-sm">
                    <i className="fa-solid fa-users-viewfinder text-pink-400 shrink-0 mt-0.5 text-lg"></i>
                    <div className="w-full">
                      <h4 className="text-xs font-bold text-pink-400 uppercase tracking-widest mb-3">דמוגרפיה ואוכלוסייה</h4>
                      
                      <div className="mb-3 flex flex-wrap items-center gap-2 bg-pink-500/10 border border-pink-500/20 px-4 py-2 rounded-xl w-full shadow-inner">
                        <i className="fa-solid fa-chart-pie text-pink-400 text-sm"></i>
                        <span className="text-sm font-bold text-pink-300/80">העם הרשמי:</span>
                        <span className="text-sm md:text-base font-black text-white">{demographics.mainNationName}</span>
                        <span className="text-sm font-black bg-pink-500 text-white px-2.5 py-0.5 rounded-md mr-auto shadow-sm">
                          {demographics.mainNationPercent}
                        </span>
                      </div>
                      
                      <p className="text-slate-300 text-sm leading-relaxed">{demographics.description}</p>
                    </div>
                  </div>
                </section>

                {/* 3. ציר זמן היסטורי */}
                <section className="space-y-4">
                  <h3 className="text-sm font-bold text-slate-500 uppercase tracking-widest border-b border-slate-800 pb-2 mb-4 flex items-center gap-2">
                    <i className="fa-solid fa-hourglass-half"></i> ציר זמן היסטורי
                  </h3>

                  <div className="flex items-start gap-3.5 bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50 hover:bg-slate-800/60 transition-colors shadow-sm">
                    <i className="fa-solid fa-calendar-days text-indigo-400 shrink-0 mt-0.5 text-lg"></i>
                    <div>
                      <h4 className="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-1.5">
                        שנות ייסוד וציוני דרך קדומים
                      </h4>
                      <p className="text-slate-300 text-sm leading-relaxed font-medium">
                        {foundingYears}
                      </p>
                    </div>
                  </div>

                  <div className="flex items-start gap-3.5 bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50 hover:bg-slate-800/60 transition-colors shadow-sm">
                    <i className="fa-solid fa-landmark text-amber-500 shrink-0 mt-0.5 text-lg"></i>
                    <div>
                      <h4 className="text-xs font-bold text-amber-500 uppercase tracking-widest mb-1.5">הקמת המדינה המודרנית</h4>
                      <p className="text-slate-300 text-sm leading-relaxed">{modernHistory}</p>
                    </div>
                  </div>
                </section>

                {/* 4. סמלים ומשמעות */}
                <section className="space-y-4">
                  <h3 className="text-sm font-bold text-slate-500 uppercase tracking-widest border-b border-slate-800 pb-2 mb-4 flex items-center gap-2">
                    <i className="fa-solid fa-flag"></i> סמלים ומשמעות לאומית
                  </h3>

                  <div 
                    className="relative h-40 md:h-48 w-full rounded-xl overflow-hidden shadow-xl cursor-pointer group mb-2 ring-1 ring-white/10"
                    onClick={() => onFlagClick(country)}
                  >
                    <div className="absolute inset-0 transition-transform duration-700 group-hover:scale-105">
                      <FlagComponent />
                    </div>
                    <div className="absolute inset-0 bg-slate-900/0 group-hover:bg-slate-900/20 transition-colors z-10 flex items-center justify-center">
                      <div className="bg-black/60 backdrop-blur-md p-3 rounded-full opacity-0 group-hover:opacity-100 transition-opacity transform group-hover:scale-110 duration-300">
                        <i className="fa-solid fa-magnifying-glass-plus text-white text-xl"></i>
                      </div>
                    </div>
                  </div>

                  <div className="flex items-start gap-3 bg-gradient-to-br from-blue-900/20 to-transparent p-4 rounded-2xl border border-blue-500/20 mb-6 shadow-sm">
                    <i className="fa-solid fa-circle-info text-blue-400 shrink-0 mt-1 text-lg"></i>
                    <div>
                      <h4 className="text-xs font-bold text-blue-400 uppercase tracking-widest mb-1.5">
                        סמליות הדגל (וקסילולוגיה)
                      </h4>
                      <p className="text-slate-300 text-sm md:text-base leading-relaxed">
                        {flagSymbolism}
                      </p>
                    </div>
                  </div>

                  <div className="flex flex-col gap-4 mt-2">
                    <div className="flex items-center gap-2 mb-1">
                      <i className="fa-solid fa-book-open text-purple-400 text-xl"></i>
                      <h4 className="text-lg font-black text-slate-100">
                        ניתוח אטימולוגי שלם
                      </h4>
                    </div>

                    <div className={`p-4 rounded-2xl border ${etymology.part1.bg} ${etymology.part1.border} shadow-sm`}>
                      <h5 className={`text-lg font-black ${etymology.part1.color} mb-3 flex items-center gap-2`}>
                        <span className="bg-slate-900/60 px-2 py-1 rounded text-xs tracking-widest font-bold">שורש ראשון</span>
                        {etymology.part1.text}
                      </h5>
                      <p className="text-slate-300 text-sm md:text-base leading-relaxed">
                        {etymology.part1.desc}
                      </p>
                    </div>

                    <div className={`p-4 rounded-2xl border ${etymology.part2.bg} ${etymology.part2.border} shadow-sm`}>
                      <h5 className={`text-lg font-black ${etymology.part2.color} mb-3 flex items-center gap-2`}>
                        <span className="bg-slate-900/60 px-2 py-1 rounded text-xs tracking-widest font-bold">הסיומת</span>
                        {etymology.part2.text}
                      </h5>
                      <p className="text-slate-300 text-sm md:text-base leading-relaxed">
                        {etymology.part2.desc}
                      </p>
                    </div>

                    <div className="mt-1 p-5 rounded-2xl bg-gradient-to-br from-slate-800 to-slate-900 border border-amber-500/30 shadow-inner flex gap-4 items-start">
                      <i className="fa-solid fa-quote-right text-amber-500/40 shrink-0 text-3xl"></i>
                      <div>
                        <h5 className="text-xs font-bold text-amber-500 uppercase tracking-widest mb-1.5">
                          משמעות המקור השלמה
                        </h5>
                        <p className="text-white font-bold text-lg md:text-xl leading-snug">
                          {etymology.synthesis}
                        </p>
                      </div>
                    </div>
                  </div>
                </section>

                {/* 5. הגורם האנושי */}
                <section className="mt-auto pt-8 border-t border-slate-800">
                  <h3 className="text-sm font-bold text-slate-500 uppercase tracking-widest pb-3 flex items-center gap-2">
                    <i className="fa-solid fa-users-viewfinder text-sm"></i> הגורם האנושי
                  </h3>
                  
                  <div className="bg-slate-950/80 p-6 rounded-[1.5rem] border border-emerald-500/20 shadow-inner space-y-6">
                    <div className="border-b border-emerald-900/30 pb-4">
                      <div className="flex items-center gap-2 mb-2">
                        <i className="fa-solid fa-circle-user text-emerald-400 text-2xl"></i>
                        <h4 className="text-2xl md:text-3xl font-black text-white">{figure.name}</h4>
                      </div>
                      <span className="text-sm font-mono font-bold text-emerald-400 bg-emerald-500/10 px-3 py-1.5 rounded-lg border border-emerald-500/20 inline-block mt-2">
                        שנות חיים: {figure.years}
                      </span>
                    </div>

                    <div className="space-y-5">
                      <div className="flex gap-4">
                        <div className="bg-slate-800 p-2 rounded-lg shrink-0 h-fit shadow-sm">
                          <i className="fa-solid fa-graduation-cap text-slate-400"></i>
                        </div>
                        <div>
                          <h5 className="text-sm font-bold text-slate-400 mb-1.5 uppercase tracking-wide">ילדות ורקע</h5>
                          <p className="text-slate-300 text-sm leading-relaxed">{figure.childhood}</p>
                        </div>
                      </div>

                      <div className="flex gap-4">
                        <div className="bg-amber-900/20 p-2 rounded-lg shrink-0 h-fit shadow-sm">
                          <i className="fa-solid fa-lightbulb text-amber-400"></i>
                        </div>
                        <div>
                          <h5 className="text-sm font-bold text-amber-400 mb-1.5 uppercase tracking-wide">אידאולוגיה</h5>
                          <p className="text-slate-300 text-sm leading-relaxed">{figure.ideology}</p>
                        </div>
                      </div>

                      <div className="flex gap-4">
                        <div className="bg-yellow-900/20 p-2 rounded-lg shrink-0 h-fit shadow-sm">
                          <i className="fa-solid fa-trophy text-yellow-500"></i>
                        </div>
                        <div>
                          <h5 className="text-sm font-bold text-yellow-500 mb-1.5 uppercase tracking-wide">הישגים מרכזיים</h5>
                          <p className="text-slate-300 text-sm leading-relaxed">{figure.achievements}</p>
                        </div>
                      </div>
                    </div>
                  </div>
                </section>

              </div>
            </article>
          );
        };

        const FlagModal = ({ country, onClose }) => {
          if (!country) return null;
          const { FlagComponent, name } = country;

          return (
            <div 
              className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/95 backdrop-blur-lg p-4 animate-in fade-in duration-300"
              onClick={onClose}
            >
              <div 
                className="relative w-full max-w-5xl bg-slate-900 border border-slate-700 rounded-3xl overflow-hidden shadow-2xl ring-2 ring-white/10"
                onClick={(e) => e.stopPropagation()} 
              >
                <button 
                  onClick={onClose}
                  className="absolute top-4 right-4 z-50 bg-black/60 hover:bg-black/90 text-white w-12 h-12 flex items-center justify-center rounded-full backdrop-blur-sm transition-all transform hover:scale-110"
                >
                  <i className="fa-solid fa-xmark text-2xl"></i>
                </button>
                
                <div className="w-full aspect-video md:aspect-[3/2] bg-black">
                  <FlagComponent />
                </div>
                
                <div className="bg-slate-900 p-5 text-center border-t border-slate-800">
                  <h2 className="text-3xl font-black text-white mb-1">דגל {name}</h2>
                  <p className="text-slate-400 text-sm">לחץ מחוץ למסגרת או על ה-X כדי לסגור</p>
                </div>
              </div>
            </div>
          );
        };

        function App() {
          const [selectedFlagCountry, setSelectedFlagCountry] = useState(null);

          return (
            <div className="min-h-screen bg-slate-950 text-slate-200 font-sans pb-16 selection:bg-amber-500/30" dir="rtl">
              
              <div className="h-2 w-full bg-gradient-to-l from-blue-600 via-amber-500 to-emerald-500 fixed top-0 z-50 shadow-lg"></div>

              <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-20 mt-4">
                
                <header className="mb-16 text-center flex flex-col items-center">
                  <div className="inline-flex items-center justify-center p-5 bg-slate-900 border-2 border-slate-800 rounded-3xl mb-8 shadow-2xl transform hover:rotate-3 transition-transform">
                    <i className="fa-solid fa-map-location-dot text-amber-400 text-5xl"></i>
                  </div>
                  <h1 className="text-5xl md:text-6xl lg:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-l from-amber-200 via-white to-amber-200 mb-6 drop-shadow-2xl">
                    מדינות הסטן בעולם
                  </h1>
                  <p className="text-slate-400 text-lg md:text-xl max-w-4xl mx-auto leading-relaxed font-medium">
                    מחקר מאסטר מקיף: היסטוריה מודרנית וקדומה, דמוגרפיה מורכבת, פירוק לשוני-אטימולוגי של שמות המדינות, וסמליות וקסילולוגית של מדינות ה-"סטן".
                  </p>
                </header>

                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 lg:gap-10">
                  {countriesData.map(country => (
                    <CountryCard 
                      key={country.id} 
                      country={country} 
                      onFlagClick={setSelectedFlagCountry} 
                    />
                  ))}
                </div>

                <footer className="mt-24 text-center border-t border-slate-800/80 pt-10">
                  <div className="inline-flex items-center justify-center gap-2 bg-slate-900/50 px-6 py-3 rounded-full border border-slate-800 shadow-md">
                    <i className="fa-solid fa-clock-rotate-left text-slate-500"></i>
                    <p className="text-slate-400 font-medium">
                      נבנה והותאם במיוחד לקריאה ב-Samsung S25 Ultra | תמיכה מלאה ב-Dark Mode
                    </p>
                  </div>
                </footer>

              </main>

              <FlagModal 
                country={selectedFlagCountry} 
                onClose={() => setSelectedFlagCountry(null)} 
              />
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
